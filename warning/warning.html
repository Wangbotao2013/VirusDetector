<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>安全警告 - 银狐木马检测</title>
  <link rel="stylesheet" href="warning.css">
</head>
<body>
  <div class="warning-container">
    <!-- 顶部红色标题 -->
    <div class="warning-header">
      <div class="warning-icon">
        <svg viewBox="0 0 24 24" width="40" height="40">
          <path d="M12 2L1 22h22L12 2z" fill="#fff" opacity=".95"/>
          <path d="M12 9v5M12 17.5v.5" stroke="#C62828" stroke-width="2.5" stroke-linecap="round"/>
        </svg>
      </div>
      <h1>安全风险警告</h1>
      <p class="warning-subtitle">银狐木马检测系统</p>
    </div>

    <!-- 风险摘要 -->
    <div class="risk-summary">
      <div class="risk-badge danger">
        <span class="risk-label">风险评分</span>
        <span class="risk-score" id="risk-score">--</span>
      </div>
      <div class="risk-message">
        <strong>该网站被识别为疑似钓鱼/恶意网站！</strong>
        <p>请勿输入任何个人信息、账号密码或进行支付操作。</p>
      </div>
    </div>

    <!-- 网站信息 -->
    <div class="info-section">
      <div class="info-row">
        <span class="info-label">当前网站</span>
        <span class="info-value danger-text" id="info-domain">--</span>
      </div>
      <div class="info-row">
        <span class="info-label">检测时间</span>
        <span class="info-value" id="info-time">--</span>
      </div>
    </div>

    <!-- AI 分析结果 -->
    <div class="ai-section" id="ai-section" style="display:none;">
      <div class="ai-header">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="#7c4dff" stroke-width="2"><path d="M12 2a2 2 0 012 2c0 .74-.4 1.39-1 1.73V7h1a7 7 0 017 7h1a1 1 0 011 1v3a1 1 0 01-1 1h-1v1a2 2 0 01-2 2H5a2 2 0 01-2-2v-1H2a1 1 0 01-1-1v-3a1 1 0 011-1h1a7 7 0 017-7h1V5.73c-.6-.34-1-.99-1-1.73a2 2 0 012-2z"/></svg>
        AI 辅助分析
        <span class="ai-badge" id="ai-badge"></span>
      </div>
      <div class="ai-body">
        <div class="ai-row" id="ai-brand-row-warning" style="display:none;">
          <span class="ai-label">冒充品牌</span>
          <span class="ai-value" id="ai-brand-warning"></span>
        </div>
        <div class="ai-row">
          <span class="ai-label">置信度</span>
          <span class="ai-value" id="ai-confidence-warning"></span>
        </div>
        <div class="ai-row">
          <span class="ai-label">分析理由</span>
          <span class="ai-value ai-reason" id="ai-reasoning-warning"></span>
        </div>
      </div>
    </div>

    <!-- 官方网站链接 -->
    <div class="official-section" id="official-section" style="display:none;">
      <div class="official-header">
        <svg viewBox="0 0 20 20" width="16" height="16" style="vertical-align:middle;margin-right:4px;"><circle cx="10" cy="10" r="9" fill="#4CAF50"/><path d="M6 10l3 3 5-5" stroke="white" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
        推荐的官方网站
      </div>
      <div class="official-domain" id="official-domain">--</div>
      <a id="official-btn" class="btn-official" href="#" target="_blank">
        前往官方网站
        <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align:middle;margin-left:4px;"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
      </a>
    </div>

    <!-- 安全建议 -->
    <div class="tips-section">
      <h3>
        <svg viewBox="0 0 24 24" width="16" height="16" fill="#C62828" style="vertical-align:middle;margin-right:4px;"><circle cx="12" cy="12" r="10" fill="#F44336" opacity=".2"/><path d="M12 8v5M12 16.5v.5" stroke="#C62828" stroke-width="2" stroke-linecap="round"/></svg>
        安全建议
      </h3>
      <ul>
        <li>不要在可疑网站输入任何个人信息</li>
        <li>不要下载或运行该网站的任何文件</li>
        <li>不要在该网站进行登录或支付操作</li>
        <li>建议立即关闭可疑页面</li>
        <li>通过官方渠道或应用商店下载软件</li>
      </ul>
    </div>

    <!-- 底部操作 -->
    <div class="actions">
      <button id="btn-close" class="btn-secondary">关闭此页面</button>
      <button id="btn-back-safe" class="btn-primary">返回安全页面</button>
    </div>
  </div>

  <script src="warning.js"></script>
</body>
</html>
